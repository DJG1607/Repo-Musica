<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2d1b4e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Música">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Reproductor de Música</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  h1 { font-size: 22px; margin-bottom: 18px; text-align: center; font-weight: 600; }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 18px;
    background: rgba(0,0,0,0.2); padding: 4px; border-radius: 10px;
  }
  .tab {
    flex: 1; padding: 9px; border: none; background: transparent;
    color: #aaa; border-radius: 7px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.15s;
  }
  .tab.active { background: rgba(167, 139, 250, 0.3); color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .now-playing { text-align: center; margin-bottom: 14px; min-height: 44px; }
  .track-title {
    font-size: 16px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-info { font-size: 12px; color: #aaa; margin-top: 4px; }
  .progress-bar {
    width: 100%; height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px; cursor: pointer; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #ec4899);
    width: 0%;
  }
  .times {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #aaa; margin: 6px 0 12px;
  }
  .controls {
    display: flex; justify-content: center; align-items: center;
    gap: 14px; margin-bottom: 14px;
  }
  .ctrl-btn {
    background: rgba(255, 255, 255, 0.08); border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255, 255, 255, 0.15); }
  .ctrl-btn.play {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    font-size: 18px;
  }
  .ctrl-btn.active { color: #a78bfa; }
  .volume { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .volume input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
    background: rgba(255, 255, 255, 0.1); border-radius: 2px; outline: none;
  }
  .volume input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #a78bfa; border-radius: 50%; cursor: pointer;
  }
  .volume input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #a78bfa; border-radius: 50%; cursor: pointer; border: none;
  }
  .pick-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .pick-list button {
    padding: 10px 12px; text-align: left;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: #fff;
    cursor: pointer; font-size: 13px;
  }
  .pick-list button:hover {
    background: rgba(167,139,250,0.2);
    border-color: rgba(167,139,250,0.4);
  }
  .source-selector {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; font-size: 13px;
  }
  .source-selector label { color: #aaa; }
  .source-selector select {
    flex: 1; padding: 7px 10px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #fff;
    font-size: 13px; outline: none; cursor: pointer;
  }
  .source-selector select:focus { border-color: #a78bfa; }
  .icon-btn.fav.saved { color: #fbbf24; background: rgba(251,191,36,0.15); }
  .live-badge {
    display: inline-block; padding: 1px 6px;
    background: rgba(239,68,68,0.25); color: #fca5a5;
    border-radius: 4px; font-size: 10px;
    margin-right: 6px; font-weight: 600;
  }
  .section-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: #888;
    margin: 12px 4px 6px;
  }
  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-bar input {
    flex: 1; padding: 10px 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: #fff; font-size: 14px; outline: none;
  }
  .search-bar input:focus { border-color: #a78bfa; }
  .btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    border: none; border-radius: 10px; color: #fff;
    cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-small { padding: 5px 10px; font-size: 11px; background: rgba(167,139,250,0.25); }
  .btn-ghost { background: rgba(255,255,255,0.08); }
  .btn-block { width: 100%; margin-bottom: 8px; }
  .results, .playlist {
    max-height: 320px; overflow-y: auto; margin-top: 10px;
  }
  .results::-webkit-scrollbar, .playlist::-webkit-scrollbar { width: 6px; }
  .results::-webkit-scrollbar-thumb, .playlist::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2); border-radius: 3px;
  }
  .item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px; font-size: 13px;
    background: rgba(255,255,255,0.03);
  }
  .item:hover { background: rgba(255,255,255,0.07); }
  .item .text { flex: 1; min-width: 0; }
  .item .name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 500;
  }
  .item .sub {
    font-size: 11px; color: #999; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item.playing { background: rgba(167,139,250,0.18); }
  .item.playing .name { color: #d4c5ff; }
  .actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.05);
    border: none; color: #fff; border-radius: 6px;
    cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: rgba(167,139,250,0.3); }
  .icon-btn.del:hover { background: rgba(239,68,68,0.4); }
  .drop-zone {
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 10px; padding: 18px;
    text-align: center; cursor: pointer;
    margin-bottom: 12px; font-size: 13px; color: #aaa;
    transition: all 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragging {
    border-color: #a78bfa; color: #fff;
    background: rgba(167,139,250,0.08);
  }
  input[type="file"] { display: none; }
  .empty { text-align: center; color: #777; font-size: 13px; padding: 18px; }
  .status {
    font-size: 12px; color: #a78bfa;
    text-align: center; min-height: 16px; margin-top: 6px;
  }
  .info-box {
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: #d4c5ff;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .info-box code {
    background: rgba(0,0,0,0.3);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
  .playlist-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .pl-tab {
    padding: 6px 12px; font-size: 12px;
    background: rgba(255,255,255,0.06);
    border: none; border-radius: 16px; color: #ccc;
    cursor: pointer;
  }
  .pl-tab.active { background: rgba(167,139,250,0.3); color: #fff; }
  .pl-tab .x { margin-left: 6px; opacity: 0.6; }
  .pl-tab .x:hover { opacity: 1; }
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #2d1b4e; padding: 20px;
    border-radius: 14px; width: 90%; max-width: 360px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .modal input {
    width: 100%; padding: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #fff;
    margin-bottom: 12px; font-size: 14px;
  }
  .modal .row { display: flex; gap: 8px; }
  .modal .row .btn { flex: 1; }
  .visualizer {
    width: 100%; height: 56px;
    margin: 6px 0 10px;
    display: block; border-radius: 6px;
  }
  .library-actions {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .library-actions .btn { flex: 1; min-width: 90px; font-size: 11px; }
  body.light .library-actions { border-top-color: rgba(0,0,0,0.08); }
  .progress-dl {
    height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; margin-top: 4px; overflow: hidden;
  }
  .progress-dl-fill {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #ec4899);
    width: 0%; transition: width 0.2s;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .header-row h1 { margin: 0; flex: 1; text-align: center; }
  .theme-btn {
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
  .lyrics-link {
    background: none; border: none; color: #a78bfa;
    font-size: 11px; cursor: pointer; margin-top: 4px;
    padding: 2px 8px;
  }
  .lyrics-link:hover { text-decoration: underline; }
  .lyrics-content {
    white-space: pre-wrap; line-height: 1.55;
    max-height: 55vh; overflow-y: auto;
    font-size: 13px; text-align: left;
    padding: 4px;
    color: rgba(255,255,255,0.9);
  }
  .lyrics-content::-webkit-scrollbar { width: 6px; }
  .lyrics-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2); border-radius: 3px;
  }

  /* ===== Modo claro ===== */
  body.light {
    background: linear-gradient(135deg, #ede9fe 0%, #fce7f3 100%);
    color: #1e1e2e;
  }
  body.light .app {
    background: rgba(255,255,255,0.55);
    border-color: rgba(0,0,0,0.08);
    box-shadow: 0 20px 60px rgba(167,139,250,0.2);
  }
  body.light .track-info, body.light .times,
  body.light .sub, body.light .empty,
  body.light .source-selector label,
  body.light .status,
  body.light .section-title { color: #555; }
  body.light .tabs { background: rgba(0,0,0,0.05); }
  body.light .tab { color: #555; }
  body.light .tab.active { background: rgba(167,139,250,0.3); color: #1e1e2e; }
  body.light .progress-bar,
  body.light .volume input[type="range"],
  body.light .progress-dl { background: rgba(0,0,0,0.08); }
  body.light .ctrl-btn:not(.play),
  body.light .icon-btn { background: rgba(0,0,0,0.06); color: #1e1e2e; }
  body.light .ctrl-btn:not(.play):hover,
  body.light .icon-btn:hover { background: rgba(167,139,250,0.2); }
  body.light .item { background: rgba(0,0,0,0.03); }
  body.light .item:hover { background: rgba(167,139,250,0.1); }
  body.light .item.playing { background: rgba(167,139,250,0.2); }
  body.light .item.playing .name { color: #5b21b6; }
  body.light .source-selector select,
  body.light .search-bar input,
  body.light .modal input {
    background: rgba(255,255,255,0.7);
    color: #1e1e2e; border-color: rgba(0,0,0,0.1);
  }
  body.light .modal { background: #f9f7ff; color: #1e1e2e; }
  body.light .info-box { background: rgba(167,139,250,0.18); color: #4c1d95; border-color: rgba(167,139,250,0.4); }
  body.light .drop-zone { border-color: rgba(0,0,0,0.15); color: #555; }
  body.light .drop-zone:hover, body.light .drop-zone.dragging {
    border-color: #a78bfa; background: rgba(167,139,250,0.1); color: #1e1e2e;
  }
  body.light .pl-tab { background: rgba(0,0,0,0.06); color: #555; }
  body.light .pl-tab.active { background: rgba(167,139,250,0.3); color: #1e1e2e; }
  body.light .pick-list button {
    background: rgba(0,0,0,0.04); color: #1e1e2e;
    border-color: rgba(0,0,0,0.08);
  }
  body.light .pick-list button:hover { background: rgba(167,139,250,0.15); }
  body.light .theme-btn { background: rgba(0,0,0,0.08); color: #1e1e2e; }
  body.light .btn-ghost { background: rgba(0,0,0,0.06); color: #1e1e2e; }
  body.light .lyrics-content { color: rgba(0,0,0,0.85); }
  body.light .info-box code { background: rgba(0,0,0,0.08); color: #1e1e2e; }
</style>
</head>
<body>
  <div class="app">
    <div class="header-row">
      <div style="width:32px"></div>
      <h1>♪ Mi Reproductor</h1>
      <button class="theme-btn" id="theme-toggle" title="Cambiar tema">🌙</button>
    </div>

    <div class="now-playing">
      <div class="track-title" id="track-title">Sin reproducir</div>
      <div class="track-info" id="track-info">Carga música para empezar</div>
      <button class="lyrics-link" id="lyrics-btn" style="display:none">📃 Ver letras</button>
    </div>
    <canvas id="visualizer" class="visualizer"></canvas>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="times">
      <span id="current-time">0:00</span>
      <span id="duration">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" title="Aleatorio">⇄</button>
      <button class="ctrl-btn" id="prev-btn" title="Anterior">⏮</button>
      <button class="ctrl-btn play" id="play-btn" title="Reproducir">▶</button>

    <div class="volume">
      <span>🔊</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">

    <div class="tabs">
      <button class="tab active" data-panel="library">Mi música</button>
      <button class="tab" data-panel="search">Buscar</button>

    <div class="panel active" id="panel-library">
      <div class="playlist-tabs" id="playlist-tabs"></div>
      <button class="btn btn-small btn-ghost" id="new-playlist-btn" style="margin-bottom:10px">＋ Nueva lista</button>

          <option value="CL">Chile</option>
          <option value="PE">Perú</option>
          <option value="VE">Venezuela</option>
          <option value="US">Estados Unidos</option>
          <option value="GB">Reino Unido</option>
          <option value="FR">Francia</option>
          <option value="DE">Alemania</option>
          <option value="IT">Italia</option>
          <option value="PT">Portugal</option>
          <option value="BR">Brasil</option>
          <option value="">🌍 Todos los países</option>

      </div>
      <div class="search-bar">
        <input type="text" id="radio-search-input" placeholder="Emisora o género (vacío = todas)">

      </div>
      <div class="status" id="radio-status">Miles de emisoras desde Radio Browser</div>

    <div class="panel" id="panel-upload">

      <button class="btn btn-block" id="pick-folder-btn">📁 Cargar desde carpeta musica</button>
      <label for="file-input" class="drop-zone" id="drop-zone">

  <audio id="audio"></audio>
  <audio id="audio-stream"></audio>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h3 id="modal-title">Nueva lista</h3>
      <input type="text" id="modal-input" placeholder="Nombre de la lista">
      <div class="pick-list" id="modal-pick-list" style="display:none"></div>
      <div class="row">
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>

      </div>

  <div class="modal-bg" id="lyrics-bg">
    <div class="modal" style="max-width:500px">
      <h3 id="lyrics-title">Letras</h3>
      <div class="lyrics-content" id="lyrics-content">Cargando...</div>
      <div class="row" style="margin-top:12px">
        <button class="btn" id="lyrics-close">Cerrar</button>
      </div>
    </div>
  </div>

<script>
// ===== IndexedDB =====
const DB_NAME = 'reproductor', DB_VER = 3;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('playlists')) d.createObjectStore('playlists', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('handles')) d.createObjectStore('handles', { keyPath: 'key' });
      if (!d.objectStoreNames.contains('radios')) d.createObjectStore('radios', { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = e => rej(e);
  });
}

function idbGet(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store).objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbAll(store) {
  return new Promise((res, rej) => {
    const r = db.transaction(store).objectStore(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbPut(store, val) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).put(val);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}
function idbDel(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).delete(key);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

// ===== Utils =====
const AUDIO_EXT = /\.(mp3|wav|ogg|m4a|flac|aac|opus|wma|webm)$/i;
function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showModal(title, placeholder, onOk) {
  document.getElementById('modal-title').textContent = title;
  modalInput.placeholder = placeholder;
  modalInput.value = '';
  modalInput.style.display = '';
  document.getElementById('modal-pick-list').style.display = 'none';
  modalOk.style.display = '';
  modalOk.textContent = 'Crear';
  modalBg.classList.add('show');
  modalInput.focus();
  modalOk.onclick = () => {
    const v = modalInput.value.trim();
    if (v) { onOk(v); modalBg.classList.remove('show'); }
  };
  modalInput.onkeydown = e => { if (e.key === 'Enter') modalOk.click(); };
}

function showPickModal(title, options, onPick) {
  document.getElementById('modal-title').textContent = title;
  modalInput.style.display = 'none';
  modalOk.style.display = 'none';
  const list = document.getElementById('modal-pick-list');
  list.style.display = 'flex';
  list.innerHTML = options.map((o, i) => `<button data-i="${i}">${escapeHtml(o.label)}</button>`).join('');
  list.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      modalBg.classList.remove('show');
      onPick(options[parseInt(b.dataset.i)]);
    };
  });
  modalBg.classList.add('show');
}

// ===== Tracks =====
async function loadAllTracks() {
  const records = await idbAll('tracks');
  allTracks = records.map(r => ({ ...r, url: URL.createObjectURL(r.blob) }));
}

async function saveTrack(track) {
  const { url, ...toStore } = track;
  await idbPut('tracks', toStore);
}

// ===== Playlists =====
async function loadPlaylists() {
  playlists = await idbAll('playlists');
  if (playlists.length === 0) {
    const def = { id: uid(), name: 'Favoritas', trackIds: [] };
    playlists.push(def);
    await idbPut('playlists', def);
  }
  currentPlaylistId = playlists[0].id;
}

async function savePlaylist(p) { await idbPut('playlists', p); }

function getCurrentPlaylist() {
  return playlists.find(p => p.id === currentPlaylistId);
}

async function addToPlaylist(trackId, playlistId) {
  const p = playlists.find(x => x.id === playlistId);
  if (!p.trackIds.includes(trackId)) {
    p.trackIds.push(trackId);
    await savePlaylist(p);
  }
}

async function removeFromPlaylist(trackId, playlistId) {
  const p = playlists.find(x => x.id === playlistId);
  p.trackIds = p.trackIds.filter(id => id !== trackId);
  await savePlaylist(p);
}

function renderPlaylistTabs() {
  const showDel = playlists.length > 1;
  plTabs.innerHTML = playlists.map(p => `
    <button class="pl-tab ${p.id === currentPlaylistId ? 'active' : ''}" data-id="${p.id}">
      ${escapeHtml(p.name)}${showDel ? ` <span class="x" data-del="${p.id}">×</span>` : ''}
    </button>
  `).join('');
  plTabs.querySelectorAll('.pl-tab').forEach(el => {
    el.onclick = e => {
      if (e.target.dataset.del) return;
      currentPlaylistId = el.dataset.id;
      renderPlaylistTabs();
      renderPlaylist();
    };
  });
  plTabs.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = async e => {
      e.stopPropagation();
      const id = el.dataset.del;
      if (!id) return;
      if (!confirm('¿Eliminar esta lista?')) return;
      await idbDel('playlists', id);
      playlists = playlists.filter(p => p.id !== id);
      if (currentPlaylistId === id) currentPlaylistId = playlists[0].id;
      renderPlaylistTabs();
      renderPlaylist();
    };
  });
}

function renderPlaylist() {
  const pl = getCurrentPlaylist();
  if (!pl) return;
  const tracks = pl.trackIds.map(id => allTracks.find(t => t.id === id)).filter(Boolean);
  if (tracks.length === 0) {
    playlistEl.innerHTML = '<div class="empty">Lista vacía — usa "Buscar" o "Añadir"</div>';
    return;
  }
  playlistEl.innerHTML = tracks.map(t => `
    <div class="item ${currentQueue[currentIndex] === t.id ? 'playing' : ''}" data-id="${t.id}">
      <div class="text">
        <div class="name">${escapeHtml(t.name)}</div>
        ${t.artist ? `<div class="sub">${escapeHtml(t.artist)}</div>` : ''}
      </div>
      <div class="actions">
        <button class="icon-btn play-track" title="Reproducir">▶</button>
        <button class="icon-btn add-to" title="Añadir a otra lista">＋</button>
        <button class="icon-btn del del-track" title="Quitar">×</button>
      </div>
    </div>
  `).join('');

  playlistEl.querySelectorAll('.item').forEach(el => {
    const id = el.dataset.id;
    el.querySelector('.play-track').onclick = () => {
      currentQueue = pl.trackIds.slice();
      currentIndex = currentQueue.indexOf(id);
      playCurrent();
    };
    el.querySelector('.add-to').onclick = () => addToOtherPlaylist(id);
    el.querySelector('.del-track').onclick = async () => {
      await removeFromPlaylist(id, currentPlaylistId);
      renderPlaylist();
    };
  });
}

function addToOtherPlaylist(trackId) {
  const others = playlists.filter(p => p.id !== currentPlaylistId);
  if (others.length === 0) {
    showModal('Sin listas disponibles', 'Nombre de nueva lista', async name => {
      const p = { id: uid(), name, trackIds: [trackId] };
      playlists.push(p);
      await savePlaylist(p);
      renderPlaylistTabs();
    });
    return;
  }
  const opts = others.map(p => ({ label: p.name, id: p.id }));
  showPickModal('Añadir a qué lista?', opts, opt => {
    addToPlaylist(trackId, opt.id);
  });
}

newPlBtn.onclick = () => {
  showModal('Nueva lista', 'Nombre', async name => {
    const p = { id: uid(), name, trackIds: [] };
    playlists.push(p);
    await savePlaylist(p);
    currentPlaylistId = p.id;
    renderPlaylistTabs();
    renderPlaylist();
  });
};

// ===== Playback =====
async function playCurrent() {
  const id = currentQueue[currentIndex];
  const t = allTracks.find(x => x.id === id);
  if (!t) return;
  switchTo(audio);
  audio.src = t.url;
  trackTitle.textContent = t.name;
  trackInfo.textContent = t.artist || (t.source === 'archive' ? 'Internet Archive' : 'Archivo local');
  try { await audio.play(); } catch(e) {}
  renderPlaylist();
}

function togglePlay() {
  if (activeAudio === audio && currentIndex === -1 && !audio.src) {
    const pl = getCurrentPlaylist();
    if (pl && pl.trackIds.length > 0) {
      currentQueue = pl.trackIds.slice();
      currentIndex = 0;
      playCurrent();
    }
    return;
  }
  if (activeAudio.paused) activeAudio.play();
  else activeAudio.pause();
}

function nextTrack() {
  if (currentQueue.length === 0) return;
  currentIndex = shuffle
    ? Math.floor(Math.random() * currentQueue.length)
    : (currentIndex + 1) % currentQueue.length;
  playCurrent();
}

function prevTrack() {
  if (currentQueue.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIndex = (currentIndex - 1 + currentQueue.length) % currentQueue.length;
  playCurrent();
}

playBtn.onclick = togglePlay;
nextBtn.onclick = nextTrack;
prevBtn.onclick = prevTrack;
shuffleBtn.onclick = () => { shuffle = !shuffle; shuffleBtn.classList.toggle('active', shuffle); };
loopBtn.onclick = () => {
  loop = !loop;
  audio.loop = loop; audioStream.loop = loop;
  loopBtn.classList.toggle('active', loop);
};

function bindAudioEvents(el) {
  el.addEventListener('play', () => {
    if (el !== activeAudio) return;
    playBtn.textContent = '⏸';
  });
  el.addEventListener('pause', () => {
    if (el !== activeAudio) return;
    playBtn.textContent = '▶';
  });
  el.addEventListener('ended', () => {
    if (el !== activeAudio) return;
    if (!loop) nextTrack();
  });
  el.addEventListener('timeupdate', () => {
    if (el !== activeAudio) return;
    if (el.duration && isFinite(el.duration)) {
      progressFill.style.width = (el.currentTime / el.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(el.currentTime);
    }
  });
  el.addEventListener('loadedmetadata', () => {
    if (el !== activeAudio) return;
    durationEl.textContent = isFinite(el.duration) && el.duration > 0 ? formatTime(el.duration) : 'LIVE';
  });
}
bindAudioEvents(audio);
bindAudioEvents(audioStream);

progressBar.onclick = e => {
  if (!activeAudio.duration || !isFinite(activeAudio.duration)) return;
  const rect = progressBar.getBoundingClientRect();
  activeAudio.currentTime = ((e.clientX - rect.left) / rect.width) * activeAudio.duration;
};

volumeSlider.oninput = e => {
  const v = parseFloat(e.target.value);
  audio.volume = v; audioStream.volume = v;
};
audio.volume = audioStream.volume = parseFloat(volumeSlider.value);

document.onkeydown = e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') nextTrack();
  else if (e.code === 'ArrowLeft') prevTrack();
};

// ===== Local file upload (accepts by extension too) =====
async function handleFiles(files) {
  const filtered = Array.from(files).filter(f =>
    f.type.startsWith('audio/') || AUDIO_EXT.test(f.name)
  );
  if (filtered.length === 0) {
    uploadStatus.textContent = '⚠ Ningún archivo de audio detectado';
    return;
  }
  uploadStatus.textContent = `Importando ${filtered.length} archivo(s)...`;
  let count = 0;
  for (const file of filtered) {
    const id = uid();
    const track = {
      id, name: file.name.replace(AUDIO_EXT, ''),
      artist: '', blob: file, source: 'local'
    };
    await saveTrack(track);
    track.url = URL.createObjectURL(file);
    allTracks.push(track);
    await addToPlaylist(id, currentPlaylistId);
    count++;
  }
  uploadStatus.textContent = `✓ ${count} canción(es) añadidas a "${getCurrentPlaylist().name}"`;
  renderPlaylist();
  setTimeout(() => uploadStatus.textContent = '', 3500);
}

fileInput.onchange = e => { handleFiles(e.target.files); fileInput.value = ''; };
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragging'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragging');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  handleFiles(e.dataTransfer.files);
};

// ===== Folder picker (File System Access API) =====
async function loadFromFolder(handle) {
  uploadStatus.textContent = 'Leyendo carpeta...';
  const files = [];
  for await (const entry of handle.values()) {
    if (entry.kind === 'file' && AUDIO_EXT.test(entry.name)) {
      try { files.push(await entry.getFile()); } catch(e) {}
    }
  }
  if (files.length === 0) {
    uploadStatus.textContent = '⚠ La carpeta no contiene archivos de audio';
    return;
  }
  await handleFiles(files);
}

pickFolderBtn.onclick = async () => {
  if (!window.showDirectoryPicker) {
    uploadStatus.textContent = '⚠ Tu navegador no soporta selección de carpetas. Usa Chrome o Edge.';

  try {
    const handle = await window.showDirectoryPicker();
    await idbPut('handles', { key: 'musicFolder', handle });
    await loadFromFolder(handle);
  } catch (err) {
    if (err.name !== 'AbortError') uploadStatus.textContent = '⚠ ' + err.message;
  }
};

  const handle = rec.handle;

// ===== Search Internet Archive =====
async function searchArchive(query) {
  searchStatus.textContent = 'Buscando...';
  resultsEl.innerHTML = '';
  try {
    const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent('mediatype:audio AND ' + query)}&fl[]=identifier&fl[]=title&fl[]=creator&rows=25&output=json`;
    const res = await fetch(url);
    const data = await res.json();
    const docs = data.response.docs || [];
    if (docs.length === 0) { searchStatus.textContent = 'Sin resultados'; return; }
    searchStatus.textContent = docs.length + ' resultados';
    resultsEl.innerHTML = docs.map(d => `
      <div class="item" data-id="${d.identifier}">
        <div class="text">
          <div class="name">${escapeHtml(d.title || d.identifier)}</div>
          <div class="sub">${escapeHtml(Array.isArray(d.creator) ? d.creator[0] : (d.creator || 'Desconocido'))}</div>
          <div class="progress-dl" style="display:none"><div class="progress-dl-fill"></div></div>
        </div>
        <div class="actions">
          <button class="icon-btn preview" title="Escuchar">▶</button>
          <button class="icon-btn download" title="Descargar y guardar">⤓</button>
        </div>
      </div>
    `).join('');
    resultsEl.querySelectorAll('.item').forEach(el => {
      const id = el.dataset.id;
      const title = el.querySelector('.name').textContent;
      const artist = el.querySelector('.sub').textContent;
      el.querySelector('.preview').onclick = () => previewArchive(id, title, artist);
      el.querySelector('.download').onclick = () => downloadArchive(el, id, title, artist);
    });
  } catch (err) {
    searchStatus.textContent = 'Error: ' + err.message;
  }
}

async function getArchiveAudioUrl(identifier) {
  const meta = await fetch(`https://archive.org/metadata/${identifier}`).then(r => r.json());
  const audioFile = (meta.files || []).find(f => /\.mp3$/i.test(f.name))
    || (meta.files || []).find(f => /\.(ogg|m4a)$/i.test(f.name));
  if (!audioFile) throw new Error('Sin audio disponible');
  return `https://archive.org/download/${identifier}/${encodeURIComponent(audioFile.name)}`;
}

async function previewArchive(identifier, title, artist) {
  searchStatus.textContent = 'Cargando preview...';
  try {
    const url = await getArchiveAudioUrl(identifier);
    switchTo(audioStream);
    audioStream.src = url;
    trackTitle.textContent = title;
    trackInfo.textContent = artist + ' (preview)';
    currentQueue = []; currentIndex = -1;
    await audioStream.play();
    searchStatus.textContent = 'Reproduciendo preview';
  } catch (err) {
    searchStatus.textContent = 'Error: ' + err.message;
  }
}

async function downloadArchive(el, identifier, title, artist) {
  const progEl = el.querySelector('.progress-dl');
  const fillEl = el.querySelector('.progress-dl-fill');
  const dlBtn = el.querySelector('.download');
  progEl.style.display = 'block';
  dlBtn.disabled = true; dlBtn.textContent = '...';
  try {
    const url = await getArchiveAudioUrl(identifier);
    const res = await fetch(url);
    const total = +res.headers.get('content-length') || 0;
    const reader = res.body.getReader();
    const chunks = [];
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (total) fillEl.style.width = (received / total * 100) + '%';
    }
    const blob = new Blob(chunks, { type: 'audio/mpeg' });
    const id = uid();
    const track = { id, name: title, artist, blob, source: 'archive' };
    await saveTrack(track);
    track.url = URL.createObjectURL(blob);
    allTracks.push(track);
    await addToPlaylist(id, currentPlaylistId);
    renderPlaylist();
    dlBtn.textContent = '✓';
    setTimeout(() => { dlBtn.textContent = '⤓'; dlBtn.disabled = false; progEl.style.display = 'none'; }, 1500);
  } catch (err) {
    dlBtn.textContent = '⚠'; dlBtn.disabled = false;
    alert('Error al descargar: ' + err.message);
  }
}

  try {
    const res = await fetch('https://api.audius.co');
    const data = await res.json();
    audiusHost = data.data[Math.floor(Math.random() * data.data.length)];
  } catch {

async function searchAudius(query) {

const RADIO_API = 'https://de1.api.radio-browser.info';

async function searchRadio(query) {
  const country = radioCountry.value;
  const countryLabel = radioCountry.options[radioCountry.selectedIndex].text.replace('🌍 ', '');
  radioStatus.textContent = query ? `Buscando "${query}" en ${countryLabel}...` : `Cargando ${countryLabel}...`;
  radioResults.innerHTML = '';
  try {
    const params = new URLSearchParams({
      limit: '100',
      hidebroken: 'true',
      order: 'clickcount',
      reverse: 'true',
      is_https: 'true'
    });
    if (query) params.set('name', query);
    if (country) params.set('countrycode', country);

    const url = `${RADIO_API}/json/stations/search?${params}`;
    const res = await fetch(url);
    let stations = await res.json();
    stations = stations.filter(s => s.url_resolved && s.url_resolved.startsWith('https://'));

    // Si filtro por país no devuelve nada con query, intentar sin país
    if (stations.length === 0 && country && query) {
      params.delete('countrycode');
      const res2 = await fetch(`${RADIO_API}/json/stations/search?${params}`);
      let s2 = await res2.json();
      stations = s2.filter(s => s.url_resolved && s.url_resolved.startsWith('https://'));
      if (stations.length > 0) {
        radioStatus.textContent = `${stations.length} emisoras (sin filtro de país)`;
        renderRadioResults(stations);
        return;
      }
    }

    if (stations.length === 0) {
      radioStatus.textContent = 'Sin resultados. Prueba otra búsqueda o país.';
      return;
    }
    radioStatus.textContent = `${stations.length} emisoras de ${countryLabel}`;
    renderRadioResults(stations);
  } catch (err) {
    radioStatus.textContent = 'Error: ' + err.message;
  }
}

async function getFavRadios() { return await idbAll('radios'); }

function renderRadioResults(stations) {
  const favs = window.__radioFavs || [];
  const favIds = new Set(favs.map(f => f.id));
  radioResults.innerHTML = '<div class="section-title">Resultados</div>' + stations.map(s => {
    const sid = s.stationuuid;
    const country = s.country || '';
    const tags = (s.tags || '').split(',').slice(0, 2).filter(Boolean).join(', ');
    const sub = [country, tags].filter(Boolean).join(' · ');
    const isFav = favIds.has(sid);
    return `
      <div class="item" data-uuid="${sid}">
        <div class="text">
          <div class="name"><span class="live-badge">EN VIVO</span>${escapeHtml(s.name.trim())}</div>
          <div class="sub">${escapeHtml(sub || 'Radio')}</div>
        </div>
        <div class="actions">
          <button class="icon-btn play-radio" title="Reproducir">▶</button>
          <button class="icon-btn fav ${isFav ? 'saved' : ''}" title="Guardar">★</button>
        </div>
      </div>
    `;
  }).join('');
  radioResults.querySelectorAll('.item').forEach(el => {
    const uuid = el.dataset.uuid;
    const s = stations.find(x => x.stationuuid === uuid);
    el.querySelector('.play-radio').onclick = () => playRadio(s);
    el.querySelector('.fav').onclick = () => toggleFavRadio(s, el.querySelector('.fav'));
  });
}

async function renderRadioFavorites() {
  const favs = await getFavRadios();
  window.__radioFavs = favs;
  if (favs.length === 0) { radioFavSection.innerHTML = ''; return; }
  radioFavSection.innerHTML = '<div class="section-title">Mis emisoras</div>' + favs.map(s => `
    <div class="item" data-uuid="${s.id}">
      <div class="text">
        <div class="name"><span class="live-badge">EN VIVO</span>${escapeHtml(s.name)}</div>
        <div class="sub">${escapeHtml(s.sub || 'Radio')}</div>
      </div>
      <div class="actions">
        <button class="icon-btn play-radio" title="Reproducir">▶</button>
        <button class="icon-btn del del-fav" title="Quitar">×</button>
      </div>
    </div>
  `).join('');
  radioFavSection.querySelectorAll('.item').forEach(el => {
    const uuid = el.dataset.uuid;
    const fav = favs.find(f => f.id === uuid);
    el.querySelector('.play-radio').onclick = () => playRadio({ stationuuid: fav.id, name: fav.name, url_resolved: fav.url, country: fav.sub });
    el.querySelector('.del-fav').onclick = async () => {
      await idbDel('radios', uuid);
      renderRadioFavorites();
    };
  });
}

async function toggleFavRadio(s, btn) {
  const favs = await getFavRadios();
  const exists = favs.find(f => f.id === s.stationuuid);
  if (exists) {
    await idbDel('radios', s.stationuuid);
    btn.classList.remove('saved');
  } else {
    const country = s.country || '';
    const tags = (s.tags || '').split(',').slice(0, 2).filter(Boolean).join(', ');
    await idbPut('radios', {
      id: s.stationuuid, name: s.name.trim(),
      url: s.url_resolved, sub: [country, tags].filter(Boolean).join(' · ')
    });
    btn.classList.add('saved');
  }
  renderRadioFavorites();
}

async function playRadio(s) {
  switchTo(audioStream);
  audioStream.src = s.url_resolved;
  trackTitle.textContent = s.name.trim();
  trackInfo.textContent = (s.country || 'Radio') + ' · EN VIVO';
  currentQueue = []; currentIndex = -1;
  durationEl.textContent = 'LIVE';
  try {
    await audioStream.play();
    radioStatus.textContent = 'Reproduciendo: ' + s.name.trim();
  } catch (err) {
    radioStatus.textContent = 'No se pudo reproducir esta emisora';
  }
}

// ===== Visualizador =====
const visualizer = document.getElementById('visualizer');
const vCtx = visualizer.getContext('2d');
let audioCtx, analyser, sourceNode, vRAF;

function resizeVisualizer() {
  visualizer.width = visualizer.clientWidth;
  visualizer.height = visualizer.clientHeight;
}

function ensureAudioCtx() {
  if (audioCtx) return true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.75;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    return true;
  } catch (e) {
    return false;
  }
}

function drawVisualizer() {
  if (!analyser) { vRAF = null; return; }
  vRAF = requestAnimationFrame(drawVisualizer);
  const len = analyser.frequencyBinCount;
  const data = new Uint8Array(len);
  analyser.getByteFrequencyData(data);
  const w = visualizer.width, h = visualizer.height;
  vCtx.clearRect(0, 0, w, h);
  const barW = w / len;
  for (let i = 0; i < len; i++) {
    const bh = Math.max(2, (data[i] / 255) * h);
    const grad = vCtx.createLinearGradient(0, h, 0, 0);
    grad.addColorStop(0, '#a78bfa');
    grad.addColorStop(1, '#ec4899');
    vCtx.fillStyle = grad;
    vCtx.fillRect(i * barW, h - bh, barW - 1, bh);
  }
}

function clearVisualizer() {
  vCtx.clearRect(0, 0, visualizer.width, visualizer.height);
}

audio.addEventListener('play', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (ensureAudioCtx()) {
    resizeVisualizer();
    if (!vRAF) drawVisualizer();
  }
});
audio.addEventListener('pause', () => {
  if (vRAF) { cancelAnimationFrame(vRAF); vRAF = null; }
});
audio.addEventListener('ended', () => {
  if (vRAF) { cancelAnimationFrame(vRAF); vRAF = null; }
  setTimeout(clearVisualizer, 100);
});
window.addEventListener('resize', resizeVisualizer);
setTimeout(resizeVisualizer, 50);

// ===== Exportar / Importar =====
function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function dataUrlToBlob(dataUrl) {
  const r = await fetch(dataUrl);
  return await r.blob();
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function exportData(includeAudio) {
  const tracks = await idbAll('tracks');
  const pls = await idbAll('playlists');
  const radios = await idbAll('radios');
  const status = document.getElementById('export-meta-btn');
  const orig = includeAudio ? document.getElementById('export-all-btn').textContent : status.textContent;

  if (includeAudio) document.getElementById('export-all-btn').textContent = 'Empaquetando...';
  else status.textContent = 'Exportando...';

  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    playlists: pls,
    radios,
    tracks: []
  };

  if (includeAudio) {
    for (const t of tracks) {
      data.tracks.push({
        id: t.id, name: t.name, artist: t.artist, source: t.source,
        audio: await blobToBase64(t.blob), mime: t.blob.type || 'audio/mpeg'
      });
    }
  } else {
    data.tracks = tracks.map(t => ({
      id: t.id, name: t.name, artist: t.artist, source: t.source
    }));
  }

  const tag = includeAudio ? 'completo' : 'listas';
  const date = new Date().toISOString().slice(0, 10);
  downloadJSON(data, `reproductor-${tag}-${date}.json`);

  if (includeAudio) document.getElementById('export-all-btn').textContent = orig;
  else status.textContent = orig;
}

async function importData(file) {
  const importBtn = document.getElementById('import-btn');
  const orig = importBtn.textContent;
  importBtn.textContent = 'Importando...';
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.version) throw new Error('Archivo no válido');

    let restored = 0;
    if (Array.isArray(data.tracks)) {
      for (const t of data.tracks) {
        if (!t.audio) continue;
        const blob = await dataUrlToBlob(t.audio);
        await idbPut('tracks', {
          id: t.id, name: t.name, artist: t.artist,
          source: t.source, blob
        });
        restored++;
      }
    }
    for (const p of data.playlists || []) await idbPut('playlists', p);
    for (const r of data.radios || []) await idbPut('radios', r);

    await loadAllTracks();
    await loadPlaylists();
    renderPlaylistTabs();
    renderPlaylist();
    await renderRadioFavorites();

    alert(`Importado: ${data.playlists?.length || 0} listas, ${restored} canciones, ${data.radios?.length || 0} emisoras`);
  } catch (err) {
    alert('Error al importar: ' + err.message);
  }
  importBtn.textContent = orig;
}

document.getElementById('export-meta-btn').onclick = () => exportData(false);
document.getElementById('export-all-btn').onclick = async () => {
  const tracks = await idbAll('tracks');
  const total = tracks.reduce((s, t) => s + (t.blob?.size || 0), 0);
  const mb = (total / 1024 / 1024).toFixed(1);
  if (tracks.length > 0 && !confirm(`Vas a exportar ${tracks.length} canciones (~${mb} MB). ¿Continuar?`)) return;
  exportData(true);
};
document.getElementById('import-btn').onclick = () => document.getElementById('import-file').click();
document.getElementById('import-file').onchange = e => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
};

// ===== Media Session (controles desde pantalla bloqueada) =====
function setMediaMetadata(t, isLive) {
  if (!('mediaSession' in navigator)) return;
  const base = location.href.replace(/[^/]*$/, '');
  navigator.mediaSession.metadata = new MediaMetadata({
    title: t.name || 'Sin título',
    artist: t.artist || (isLive ? 'Radio en vivo' : 'Mi Reproductor'),
    album: isLive ? 'Radio' : 'Mi Reproductor',
    artwork: [
      { src: base + 'icon-192.png', sizes: '192x192', type: 'image/png' },
      { src: base + 'icon-512.png', sizes: '512x512', type: 'image/png' }
    ]
  });
}

if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => activeAudio.play());
  navigator.mediaSession.setActionHandler('pause', () => activeAudio.pause());
  navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
  navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
  try {
    navigator.mediaSession.setActionHandler('seekto', e => {
      if (e.seekTime != null && isFinite(activeAudio.duration)) activeAudio.currentTime = e.seekTime;
    });
  } catch {}
}

[audio, audioStream].forEach(el => {
  el.addEventListener('play', () => {
    if (el === activeAudio && 'mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  });
  el.addEventListener('pause', () => {
    if (el === activeAudio && 'mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  });
});

const lyricsBtn = document.getElementById('lyrics-btn');
const lyricsBg = document.getElementById('lyrics-bg');
const lyricsTitle = document.getElementById('lyrics-title');
const lyricsContent = document.getElementById('lyrics-content');
document.getElementById('lyrics-close').onclick = () => lyricsBg.classList.remove('show');

function parseArtistTitle(t) {
  let artist = t.artist || '';
  let title = t.name || '';
  if (!artist) {
    const m = title.match(/^(.+?)\s*-\s*(.+)$/);
    if (m) { artist = m[1].trim(); title = m[2].trim(); }
  }
  title = title.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*\[.*?\]\s*/g, '').trim();
  title = title.replace(/\s*-?\s*(official|video|audio|lyrics|hd|hq|remastered).*$/i, '').trim();
  return { artist, title };
}

async function fetchLyrics(artist, title) {
  try {
    const r = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`);
    if (!r.ok) return null;
    const data = await r.json();
    return data.lyrics && data.lyrics.trim() ? data.lyrics : null;
  } catch { return null; }
}

function showLyricsButton(t) {
  if (!t) { lyricsBtn.style.display = 'none'; return; }
  lyricsBtn.style.display = '';
  lyricsBtn.onclick = () => openLyrics(t);
}

async function openLyrics(t) {
  const { artist, title } = parseArtistTitle(t);
  lyricsTitle.textContent = title || t.name;
  lyricsContent.textContent = 'Buscando letras...';
  lyricsBg.classList.add('show');
  if (!artist) {
    lyricsContent.textContent = 'No se encontró el artista.\n\nPara que funcione, el archivo debe tener formato "Artista - Canción", o ser una pista descargada con artista identificado.';
    return;
  }
  const lyrics = await fetchLyrics(artist, title);
  lyricsContent.textContent = lyrics || `No se encontraron letras para:\n\n${artist} - ${title}\n\nA veces el título tiene variantes que la API no reconoce. Prueba editando el nombre del archivo.`;
}
